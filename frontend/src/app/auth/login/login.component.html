<div class="container">
  <h2>Connexion</h2>
  <p *ngIf="error" style="color:red">{{ error }}</p>
  <input [(ngModel)]="data.email"    type="email"    placeholder="Email" /><br>
  <input [(ngModel)]="data.password" type="password" placeholder="Mot de passe" /><br>
  <button (click)="onSubmit()">Se connecter</button>
  <a routerLink="/auth/register">Pas encore inscrit ?</a>
</div>
