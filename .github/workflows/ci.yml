name: CI/CD Laravel Medical App

on:
  push:
    branches: [ "dev", "main" ]
  pull_request:
    branches: [ "dev", "main" ]

jobs:

# =========================
# BACKEND LARAVEL + PHPUnit
# =========================
  laravel-tests:
    name: Laravel Backend Tests
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: medcine_db_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout Project
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.2
          extensions: mbstring, dom, curl, pdo_mysql
          coverage: none

      - name: Cache Composer Packages
        uses: actions/cache@v4
        with:
          path: backend/vendor
          key: ${{ runner.os }}-php-${{ hashFiles('backend/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-

      - name: Install Composer Dependencies
        run: |
          cd backend
          composer install --prefer-dist --no-progress --no-interaction

      - name: Prepare Laravel Environment
        run: |
          cd backend
          cp .env.example .env
          php artisan key:generate

          sed -i 's/DB_CONNECTION=.*/DB_CONNECTION=mysql/' .env
          sed -i 's/DB_HOST=.*/DB_HOST=127.0.0.1/' .env
          sed -i 's/DB_PORT=.*/DB_PORT=3306/' .env
          sed -i 's/DB_DATABASE=.*/DB_DATABASE=medcine_db_test/' .env
          sed -i 's/DB_USERNAME=.*/DB_USERNAME=root/' .env
          sed -i 's/DB_PASSWORD=.*/DB_PASSWORD=root/' .env

      - name: Wait For MySQL
        run: sleep 15

      - name: Run Database Migrations
        run: |
          cd backend
          php artisan migrate --force

      - name: Run PHPUnit Tests
        run: |
          cd backend
          php artisan test

# =========================
# FRONTEND ANGULAR
# =========================
  frontend-tests:
    name: Angular Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Project
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Cache Node Modules
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install Dependencies
        run: |
          cd frontend
          npm ci

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Run Angular Tests
        run: |
          cd frontend
          npm test -- --watch=false --browsers=ChromeHeadless

      - name: Build Angular App
        run: |
          cd frontend
          npm run build

# =========================
# DOCKER BUILD CHECK
# =========================
  docker-build:
    name: Docker Build Verification
    runs-on: ubuntu-latest
    needs: [laravel-tests, frontend-tests]

    steps:
      - name: Checkout Project
        uses: actions/checkout@v4

      - name: Build Docker Containers
        run: docker compose build

# =========================
# OPTIONAL DEPLOY MAIN
# =========================
  deploy:
    name: Production Deploy
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy Placeholder
        run: echo "Deploy to VPS / Render / Railway / Hostinger here"